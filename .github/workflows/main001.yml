name: Pearl Miner Windows Build

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  build-windows:

    runs-on: windows-latest

    steps:

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false


      # -------------------------
      # Rust
      # -------------------------
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable


      # -------------------------
      # Python
      # -------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"


      # -------------------------
      # Prepare
      # -------------------------
      - name: Prepare directories
        shell: bash
        run: |
          mkdir -p dist


      # -------------------------
      # Build pearl-gateway
      # -------------------------
      - name: Build pearl-gateway.exe
        shell: bash
        run: |
          cd miner/pearl-gateway

          cargo build --release

          cp target/release/pear-gateway.exe ../../dist/


      # -------------------------
      # Build vllm-miner
      # -------------------------
      - name: Install vllm-miner
        shell: bash
        run: |
          cd miner

          python -m pip install --upgrade pip

          pip install uv

          uv sync --package vllm-miner


      - name: Build vllm-miner.exe
        shell: bash
        run: |
          pip install pyinstaller

          cd miner/vllm-miner

          pyinstaller \
            --onefile \
            --name vllm-miner \
            .

          cp dist/vllm-miner.exe ../../dist/


      # -------------------------
      # Check
      # -------------------------
      - name: Check output
        shell: bash
        run: |
          ls -lah dist/


      # -------------------------
      # Zip
      # -------------------------
      - name: Package release
        shell: bash
        run: |
          cd dist

          7z a ../pearl-miner-windows.zip *


      # -------------------------
      # Upload
      # -------------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: pearl-miner-windows
          path: pearl-miner-windows.zip
          retention-days: 30
